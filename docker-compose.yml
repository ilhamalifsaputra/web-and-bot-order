# Compose for the migrated Node stack. All three services share ONE image and
# ONE SQLite file (./data/bot.db, WAL mode) via the mounted ./data volume.
#
# Phased cutover (see RUN.md): you can bring services up one at a time, e.g.
#   docker compose up -d notifier      # Fase 1
#   docker compose up -d web-admin     # Fase 3
#   docker compose up -d order-bot     # Fase 5  (stop the Python bot FIRST)
#
# IMPORTANT (migrate.md §14.12): never run the Python order-bot and the Node
# order-bot against the same DB simultaneously — two order-flow writers corrupt
# state. notifier (status-only writes) is safe to parallel-run during Fase 1.

x-app: &app
  build:
    context: .
  image: bot-order-node:latest
  restart: unless-stopped
  env_file:
    - .env
  volumes:
    - ./data:/app/data
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

services:
  order-bot:
    <<: *app
    container_name: bot-order
    command: ["pnpm", "--filter", "@app/order-bot", "start"]

  notifier:
    <<: *app
    container_name: bot-notifier
    command: ["pnpm", "--filter", "@app/notifier", "start"]

  web-admin:
    <<: *app
    container_name: bot-web-admin
    command: ["pnpm", "--filter", "@app/web-admin", "start"]
    # Must bind 0.0.0.0 inside the container (config default is 127.0.0.1).
    environment:
      WEB_HOST: "0.0.0.0"
    ports:
      - "${WEB_PORT:-8000}:${WEB_PORT:-8000}"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:'+(process.env.WEB_PORT||8000)+'/login').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
