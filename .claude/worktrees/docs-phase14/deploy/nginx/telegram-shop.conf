# Reverse proxy + TLS for the public release (execution/02, H-2).
#
# Topology: nginx terminates TLS and proxies to the apps, which stay bound to
# 127.0.0.1 (docker-compose maps WEB_PORT=8000 / STOREFRONT_PORT=8100 to the
# host loopback). Two subdomains:
#   admin.example.com → web-admin  (127.0.0.1:8000)
#   shop.example.com  → storefront (127.0.0.1:8100)
#
# Replace example.com + cert paths. Get certs with:
#   certbot --nginx -d admin.example.com -d shop.example.com
# Then: nginx -t && systemctl reload nginx
#
# NOTE (app config): set WEB_COOKIE_SECURE=true in prod (.env) so session cookies
# carry the Secure flag — browsers see HTTPS via nginx, so this works without any
# app change. Login lockout already reads X-Forwarded-For (apps/web-admin auth.ts
# clientIp), so it gets the real client IP from the header below.

# ---- 80 → 443 redirect (both hosts) ----
server {
  listen 80;
  listen [::]:80;
  server_name admin.example.com shop.example.com;
  # Let certbot's ACME challenge through; everything else upgrades to HTTPS.
  location /.well-known/acme-challenge/ { root /var/www/certbot; }
  location / { return 301 https://$host$request_uri; }
}

# ---- Shared proxy settings ----
# (kept in a snippet so both server blocks stay identical)
#   include /etc/nginx/snippets/telegram-shop-proxy.conf;
# Inlined here for a single-file drop-in:

# ---- web-admin (admin subdomain) ----
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name admin.example.com;

  ssl_certificate     /etc/letsencrypt/live/admin.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/admin.example.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  # Image uploads (branding/QR) — keep in step with handleUpload maxBytes.
  client_max_body_size 8m;

  # Surface upstream failures fast so a 502 is diagnosable, not a 60s hang.
  proxy_connect_timeout 5s;
  proxy_read_timeout    30s;
  proxy_send_timeout    30s;

  location / {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# ---- storefront (shop subdomain) ----
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name shop.example.com;

  ssl_certificate     /etc/letsencrypt/live/shop.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/shop.example.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  client_max_body_size 8m;

  proxy_connect_timeout 5s;
  proxy_read_timeout    30s;
  proxy_send_timeout    30s;

  location / {
    proxy_pass http://127.0.0.1:8100;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
